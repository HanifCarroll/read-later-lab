services:
  app:
    build:
      context: .
      target: release
    env_file:
      - path: .env
        required: false
    environment:
      ADDR: :8080
      DATABASE_URL: postgres://read_later:password@postgres:5432/read_later?sslmode=disable
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: read_later
      POSTGRES_PASSWORD: password
      POSTGRES_DB: read_later
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U read_later -d read_later"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
